<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Vault - Send ETH/Tokens</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🪙 Token Vault</h1>
            <p class="subtitle">Send ETH and ERC-20 Tokens</p>
        </header>

        <main>
            <div class="wallet-info">
                <h3>Wallet</h3>
                <div class="info-row">
                    <span class="label">Address:</span>
                    <span class="value" id="walletAddress">Not Connected</span>
                </div>
                <div class="info-row">
                    <span class="label">Balance:</span>
                    <span class="value" id="balance">-- ETH</span>
                </div>
                <button id="connectBtn" class="btn btn-secondary">Connect Wallet</button>
            </div>

            <form id="sendForm" class="send-form">
                <h3>Send Transaction</h3>
                
                <div class="form-group">
                    <label for="tokenType">Token Type</label>
                    <select id="tokenType" required>
                        <option value="ETH">ETH (Native)</option>
                        <option value="ERC20">ERC-20 Token</option>
                    </select>
                </div>

                <div class="form-group" id="tokenAddressGroup" style="display: none;">
                    <label for="tokenAddress">Token Contract Address</label>
                    <input type="text" id="tokenAddress" placeholder="0x..." pattern="^0x[a-fA-F0-9]{40}$">
                </div>

                <div class="form-group">
                    <label for="toAddress">Recipient Address</label>
                    <input type="text" id="toAddress" placeholder="0x..." required pattern="^0x[a-fA-F0-9]{40}$">
                    <span class="error" id="toAddressError"></span>
                </div>

                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="0.0" step="0.000000000000000001" min="0" required>
                </div>

                <div class="form-group">
                    <label for="gasPrice">Gas Price (Gwei)</label>
                    <input type="number" id="gasPrice" placeholder="Auto" step="0.1" min="0">
                </div>

                <div class="form-group">
                    <label for="gasLimit">Gas Limit</label>
                    <input type="number" id="gasLimit" placeholder="Auto" min="21000">
                </div>

                <div class="form-group">
                    <label for="nonce">Nonce (Optional)</label>
                    <input type="number" id="nonce" placeholder="Auto">
                </div>

                <div class="form-group">
                    <label for="data">Data (Hex)</label>
                    <textarea id="data" placeholder="0x..." rows="2"></textarea>
                </div>

                <div class="gas-estimate" id="gasEstimate">
                    <span>Estimated Gas: </span>
                    <span id="estimatedGas">--</span>
                </div>

                <button type="submit" id="sendBtn" class="btn btn-primary" disabled>
                    Send Transaction
                </button>
            </form>

            <div class="status-panel" id="statusPanel">
                <h3>Transaction Status</h3>
                <div id="statusMessage" class="status-message"></div>
                <div id="txHash" class="tx-hash"></div>
            </div>
        </main>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p id="loadingText">Processing...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
